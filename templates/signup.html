<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - ServiceHub</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            display: flex;
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Left Panel - Branding */
        .brand-panel {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 50px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .brand-panel h1 {
            font-size: 42px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .brand-panel .subtitle {
            font-size: 18px;
            opacity: 0.95;
            line-height: 1.6;
        }

        .stats {
            margin-top: 40px;
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* Right Panel - Form */
        .form-panel {
            flex: 1;
            padding: 40px;
            background: white;
            overflow-y: auto;
            max-height: 90vh;
        }

        .form-panel h2 {
            font-size: 28px;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .form-panel .subtitle {
            color: #6b7280;
            margin-bottom: 25px;
            font-size: 14px;
        }

        /* Combined Name Field */
        .name-field {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .name-field .input-group {
            flex: 1;
            margin-bottom: 0;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #374151;
            font-weight: 500;
            font-size: 13px;
        }

        .input-group label .required {
            color: #ef4444;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            background: #f9fafb;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .double-field {
            display: flex;
            gap: 12px;
        }

        .double-field .input-group {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 14px;
            text-align: center;
        }

        .message.error {
            background: #fee2e2;
            color: #dc2626;
            border-left: 4px solid #dc2626;
        }

        .message.success {
            background: #d1fae5;
            color: #059669;
            border-left: 4px solid #059669;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #6b7280;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .password-requirements {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 5px;
        }

        /* Scrollbar */
        .form-panel::-webkit-scrollbar {
            width: 6px;
        }

        .form-panel::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .form-panel::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .brand-panel {
                padding: 30px;
            }
            .form-panel {
                padding: 25px;
            }
            .name-field {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Left Branding Panel -->
    <div class="brand-panel">
        <h1>ServiceHub</h1>
        <p class="subtitle">Join our community of satisfied customers</p>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number">5K+</div>
                <div class="stat-label">Happy Customers</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">50+</div>
                <div class="stat-label">Expert Technicians</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">24/7</div>
                <div class="stat-label">Support</div>
            </div>
        </div>
    </div>

    <!-- Right Form Panel -->
    <div class="form-panel">
        <h2>Create Account ✨</h2>
        <p class="subtitle">Fill in your details to get started</p>

        <form method="POST">
            <!-- FULL NAME - Combined in ONE field (First, Middle, Last together) -->
            <div class="name-field">
                <div class="input-group">
                    <label>First Name <span class="required">*</span></label>
                    <input type="text" name="firstname" placeholder="Enter first name" required>
                </div>
                <div class="input-group">
                    <label>Middle Name</label>
                    <input type="text" name="middlename" placeholder="Optional">
                </div>
                <div class="input-group">
                    <label>Last Name <span class="required">*</span></label>
                    <input type="text" name="lastname" placeholder="Enter last name" required>
                </div>
            </div>

            <!-- Age, Birthdate, Cellphone in one row -->
            <div class="double-field">
                <div class="input-group">
                    <label>Age <span class="required">*</span></label>
                    <input type="number" name="age" placeholder="Age" required>
                </div>
                <div class="input-group">
                    <label>Birthdate <span class="required">*</span></label>
                    <input type="date" name="birthdate" required>
                </div>
                <div class="input-group">
                    <label>Cellphone <span class="required">*</span></label>
                    <input type="tel" name="cellphone" placeholder="09XXXXXXXXX" required>
                </div>
            </div>

            <!-- Address - Full width -->
            <div class="input-group">
                <label>Address <span class="required">*</span></label>
                <input type="text" name="address" placeholder="House/Unit #, Street, City, Province" required>
            </div>

            <!-- Email and Username in one row -->
            <div class="double-field">
                <div class="input-group">
                    <label>Email Address <span class="required">*</span></label>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Username <span class="required">*</span></label>
                    <input type="text" name="username" placeholder="Choose a username" required>
                </div>
            </div>

            <!-- Password Fields -->
            <div class="double-field">
                <div class="input-group">
                    <label>Password <span class="required">*</span></label>
                    <input type="password" name="password" placeholder="Create a password" required>
                    <div class="password-requirements">Minimum 4 characters</div>
                </div>
                <div class="input-group">
                    <label>Confirm Password <span class="required">*</span></label>
                    <input type="password" name="confirm_password" placeholder="Confirm your password" required>
                </div>
            </div>

            <button type="submit">Create Account →</button>
        </form>

        {% if message %}
            <div class="message error">{{ message }}</div>
        {% endif %}

        <div class="login-link">
            Already have an account? <a href="/login">Sign In</a>
        </div>
    </div>
</div>

</body>
</html>
